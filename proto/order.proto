syntax = "proto3";
package proto;
option go_package = "task-manager/proto/generate;proto";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

service TaskService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {
    option (google.api.http) = {
      post: "/order/create"
      body: "*"
    };
  }

  rpc GetOrderByID(GetOrderRequest) returns (GetOrderResponse) {
    option (google.api.http) = {
      post: "/order/get/id"
      body: "*"
    };
  }

  rpc GetOrderByUerID(CreateOrderRequest) returns (CreateOrderResponse) {
    option (google.api.http) = {
      post: "/order/get/user-id"
      body: "*"
    };
  }

  rpc ListOrders(google.protobuf.Empty) returns (ListOrderResponse) {
    option (google.api.http) = {
      post: "/order/list"
      body: "*"
    };
  }

  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse) {
    option (google.api.http) = {
      put: "/order/update/status"
      body: "*"
    };
  }

  rpc DeleteOrder(DeleteOrderRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/order/delete"
      body: "*"
    };
  }
}

message Order {
  int64 id = 1;
  int64 userId = 2;
  int64 amount = 3;
  Status status = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message CreateOrderRequest {
  int64 userId = 1;
  int64 amount = 2;
  Status status = 3;
}

enum Status {
  CREATED  = 0;
  ACCEPTED = 1;
  READY    = 2;
  DELIVERED = 3;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  int64 id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message ListOrderResponse {
  repeated Order orders = 1;
}

message UpdateOrderStatusRequest {
  int64 id = 1;
  Status status = 2;
}

message UpdateOrderStatusResponse {
  Order order = 1;
}

message DeleteOrderRequest {
  int64 id = 1;
}