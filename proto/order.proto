syntax = "proto3";
package proto;
option go_package = "task-manager/proto/generate;proto";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

service OrderService {
  rpc Create(CreateRequest) returns (CreateResponse) {
    option (google.api.http) = {
      post: "/order/create"
      body: "*"
    };
  }

  rpc GetByID(GetByIdRequest) returns (GetByIdResponse) {
    option (google.api.http) = {
      post: "/order/get/{id}"
      body: "*"
    };
  }

  rpc GetByUerID(GetByUserIdRequest) returns (GetByUserIdResponse) {
    option (google.api.http) = {
      post: "/order/get/userId"
      body: "*"
    };
  }

  rpc ListAll(google.protobuf.Empty) returns (ListOrderResponse) {
    option (google.api.http) = {
      post: "/order/list"
      body: "*"
    };
  }

  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse) {
    option (google.api.http) = {
      put: "/order/update/status/{id}"
      body: "*"
    };
  }

  rpc Delete(DeleteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/order/delete"
      body: "*"
    };
  }
}

message Order {
  int32 id = 1;
  int32 userId = 2;
  float amount = 3;
  Status status = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message CreateRequest {
  int32 userId = 1;
  float amount = 2;
  Status status = 3;
}

enum Status {
  CREATED  = 0;
  ACCEPTED = 1;
  READY    = 2;
  DELIVERED = 3;
}

message CreateResponse {
  Order order = 1;
}

message GetByIdRequest {
  int32 id = 1;
}

message GetByIdResponse {
  Order order = 1;
}

message GetByUserIdRequest {
  int32 id = 1;
}

message GetByUserIdResponse {
  Order order = 1;
}

message ListOrderResponse {
  repeated Order orders = 1;
}

message UpdateStatusRequest {
  int32 id = 1;
  Status status = 2;
}

message UpdateStatusResponse {
  Order order = 1;
}

message DeleteRequest {
  int32 id = 1;
}